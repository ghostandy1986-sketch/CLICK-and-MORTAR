<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto ATM</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-image: url('crypto3.png'); /* Replace with your background */
    background-size: cover;
    background-position: center;
    color: #fff;
    margin: 0;
}
header {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background-color: rgba(0, 0, 0, 0.8);
}
header h1 {
    margin: 0;
    font-size: 2rem;
    color: #4caf50;
}
#crypto-atm-section {
    text-align: center;
    padding: 20px;
}
#crypto-atm-section button {
    padding: 15px 30px;
    font-size: 1.2rem;
    background-color: #4caf50;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    transition: background-color 0.3s ease;
}
#crypto-atm-section button:hover {
    background-color: #388e3c;
}
#form-section {
    display: none;
    text-align: center;
    margin: 20px auto;
    padding: 20px;
    background-color: rgba(0, 0, 0, 0.8);
    border-radius: 10px;
    width: 90%;
    max-width: 600px;
}
#form-section label, #form-section select, #form-section input {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    font-size: 1rem;
    border: none;
    border-radius: 5px;
}
#form-section select, #form-section input {
    background-color: #2e2e2e;
    color: white;
}
#amount-section {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 15px;
}
#amount-section label {
    flex: 1;
    text-align: left;
}
#amount-section .options {
    flex: 2;
    display: flex;
    justify-content: flex-end;
    gap: 20px;
}
#amount-section input[type="radio"] {
    margin-right: 5px;
}
#additional-fields {
    display: none;
    margin-top: 20px;
    text-align: left;
}
#additional-fields label {
    margin-bottom: 5px;
}
#additional-fields input {
    margin-bottom: 15px;
}
#error-message {
    color: #ff4d4d;
    margin-top: 10px;
    display: none;
}
#result-section {
    margin: 20px auto;
    text-align: center;
}
#result-section p {
    font-size: 1.2rem;
    color: #4caf50;
}
footer {
    margin: 20px;
    text-align: center;
    color: #fff;
}
</style>
</head>
<body>
<header>
<h1>Crypto ATM</h1>
</header>
<section id="crypto-atm-section">
<button onclick="openATM()">Open Crypto ATM</button>
</section>
<section id="form-section">
<h2>Transfer Crypto to Cash</h2>
<p>Note: A reasonable fee of <strong>2%</strong> will be applied to all transactions.</p>
<label for="crypto-select">Select Cryptocurrency:</label>
<select id="crypto-select"></select>
<label for="wallet-address">Enter Wallet Address:</label>
<input type="text" id="wallet-address" placeholder="Wallet Address">
<div id="amount-section">
    <label for="amount">Enter Amount to Transfer:</label>
    <div class="options">
        <input type="radio" id="transfer-crypto" name="transfer-method" value="crypto" checked>
        <label for="transfer-crypto">Crypto Units</label>
        <input type="radio" id="transfer-usd" name="transfer-method" value="usd">
        <label for="transfer-usd">USD</label>
    </div>
</div>
<input type="number" id="amount" placeholder="Amount">
<label for="transfer-option">Choose Transfer Option:</label>
<select id="transfer-option" onchange="displayAdditionalFields()">
    <option value="">Select Method</option>
    <option value="debit">Debit Card</option>
    <option value="reloadable-bank">Reloadable Bank Card</option>
    <option value="membership-card">Membership Card</option>
</select>
<div id="additional-fields"></div>
<p id="error-message">Please fill out all required fields.</p>
<button onclick="processTransfer()">Submit</button>
</section>
<section id="result-section"></section>
<footer>
<p>© 2024 Crypto ATM Service. All rights reserved.</p>
</footer>
<script>
const transferFeePercentage = 2;

// Open the ATM form
function openATM() {
    const formSection = document.getElementById('form-section');
    formSection.style.display = 'block';
    loadCryptocurrencies();
}

// Fetch live cryptocurrency data
async function loadCryptocurrencies() {
    try {
        const response = await fetch('https://api.coinbase.com/v2/exchange-rates');
        const data = await response.json();
        const rates = data.data.rates;

        const cryptoSelect = document.getElementById('crypto-select');
        cryptoSelect.innerHTML = '';
        Object.keys(rates).forEach((crypto) => {
            const priceUSD = parseFloat(rates[crypto]).toFixed(2);
            cryptoSelect.innerHTML += `<option value="${crypto}">${crypto} - $${priceUSD}</option>`;
        });
    } catch (error) {
        console.error('Error fetching live data:', error);
        alert('Unable to fetch live crypto values. Please try again later.');
    }
}

// Display additional fields based on the selected transfer method
function displayAdditionalFields() {
    const transferOption = document.getElementById('transfer-option').value;
    const additionalFields = document.getElementById('additional-fields');
    additionalFields.style.display = 'block';
    additionalFields.innerHTML = '';
    if (transferOption === 'debit' || transferOption === 'reloadable-bank') {
        additionalFields.innerHTML = `
            <label for="card-name">Name on Card:</label>
            <input type="text" id="card-name" required>
            <label for="card-number">Card Number:</label>
            <input type="text" id="card-number" required>
            <label for="card-expiration">Expiration Date:</label>
            <input type="text" id="card-expiration" required>
            <label for="card-cvv">CVV:</label>
            <input type="text" id="card-cvv" required>
        `;
    } else if (transferOption === 'membership-card') {
        additionalFields.innerHTML = `
            <label for="membership-id">Membership Card ID:</label>
            <input type="text" id="membership-id" required>
        `;
    }
}

// Validate all fields
function validateFields() {
    const additionalFields = document.getElementById('additional-fields');
    const requiredInputs = additionalFields.querySelectorAll('input');
    for (const input of requiredInputs) {
        if (!input.value.trim()) {
            return false;
        }
    }
    return true;
}

// Process the transfer
function processTransfer() {
    const crypto = document.getElementById('crypto-select').value;
    const wallet = document.getElementById('wallet-address').value;
    const amount = parseFloat(document.getElementById('amount').value);
    const transferOption = document.getElementById('transfer-option').value;
    if (!crypto || !wallet || isNaN(amount) || amount <= 0 || !validateFields()) {
        document.getElementById('error-message').style.display = 'block';
        return;
    }
    document.getElementById('error-message').style.display = 'none';
    const fee = (transferFeePercentage / 100) * amount;
    const amountAfterFee = amount - fee;
    document.getElementById('result-section').innerHTML = `
        <p>Transaction Successful!</p>
        <p>Crypto: ${crypto}</p>
        <p>Amount After Fee: ${amountAfterFee.toFixed(2)} ${crypto}</p>
    `;
}
</script>
</body>
</html>
