<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Closet Organizer</title>
  <style>
    /* Global Styles */
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .closet-container {
      position: relative;
      width: 90%;
      max-width: 1200px;
      height: 500px;
      background-color: transparent;
      border: 2px solid #ddd;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .closet-pole {
      position: absolute;
      top: 50px;
      left: 5%;
      width: 90%;
      height: 10px;
      background-color: #888;
      border-radius: 5px;
      pointer-events: none;
    }

    .clothing-item {
      position: absolute;
      width: 100px;
      height: 150px;
      background-size: cover;
      background-position: center;
      cursor: grab;
      background-color: transparent;
      border: 2px solid transparent;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      transform-origin: top center;
      will-change: transform;
    }

    .clothing-item.dragging {
      z-index: 1000;
      cursor: grabbing;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .clothing-item.zoomed {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(2);
      z-index: 2000;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .tooltip {
      position: absolute;
      background-color: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
      z-index: 1001;
    }

    /* Fabric Animations */
    @keyframes shirt-wave {
      0%, 100% { transform: rotate(0deg) skewX(0deg); }
      25% { transform: rotate(1deg) skewX(1deg); }
      75% { transform: rotate(-1deg) skewX(-1deg); }
    }

    @keyframes jacket-sway {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(2deg); }
    }

    @keyframes dress-flow {
      0%, 100% { transform: skewX(0deg); }
      50% { transform: skewX(1deg); }
    }

    .clothing-item:hover:not(.dragging):not(.zoomed) {
      animation: none;
    }

    #shirt1:hover:not(.dragging):not(.zoomed) { animation: shirt-wave 2s ease-in-out infinite; }
    #jacket1:hover:not(.dragging):not(.zoomed) { animation: jacket-sway 2.5s ease-in-out infinite; }
    #dress1:hover:not(.dragging):not(.zoomed) { animation: dress-flow 3s ease-in-out infinite; }

    .staggered {
      transform: rotate(-15deg);
    }

    .view-options {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      z-index: 100;
    }

    .view-options button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .view-options button:hover {
      background-color: #0056b3;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      z-index: 1999;
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="closet-container" id="closetContainer">
  <div class="closet-pole" id="closetPole"></div>
  
  <div class="clothing-item" id="shirt1" style="background-image: url('Shirt1.png'); top: 70px; left: 100px;">
    <div class="tooltip">Brand: Nike - $25</div>
  </div>
  <div class="clothing-item" id="dress1" style="background-image: url('dress1.png'); top: 70px; left: 220px;">
    <div class="tooltip">Brand: Zara - $60</div>
  </div>
  <div class="clothing-item" id="jacket1" style="background-image: url('jacket1.png'); top: 70px; left: 340px;">
    <div class="tooltip">Brand: H&M - $50</div>
  </div>
  <div class="clothing-item" id="pants1" style="background-image: url('suit1.png'); top: 70px; left: 460px;">
    <div class="tooltip">Brand: Levi's - $40</div>
  </div>
  <div class="clothing-item" id="skirt1" style="background-image: url('shirt2.png'); top: 70px; left: 580px;">
    <div class="tooltip">Brand: Mango - $30</div>
  </div>

  <div class="view-options">
    <button id="slantedView">Staggered View</button>
    <button id="facingOutView">Facing Out</button>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const closetContainer = document.getElementById('closetContainer');
  const clothingItems = document.querySelectorAll('.clothing-item');
  const overlay = document.getElementById('overlay');
  let activeItem = null;
  let initialX, initialY;
  let isZoomed = false;

  // Precise dragging functionality
  clothingItems.forEach(item => {
    const tooltip = item.querySelector('.tooltip');

    item.addEventListener('mousedown', (e) => {
      if (activeItem || isZoomed) return;
      
      e.preventDefault();
      activeItem = item;
      item.classList.add('dragging');
      
      const rect = item.getBoundingClientRect();
      initialX = e.clientX - rect.left;
      initialY = e.clientY - rect.top;

      document.addEventListener('mousemove', onDrag);
      document.addEventListener('mouseup', stopDrag);
    });

    // Show tooltip on hover
    item.addEventListener('mouseover', () => {
      if (!activeItem && !isZoomed) {
        tooltip.style.opacity = '1';
        tooltip.style.left = '110%';
        tooltip.style.top = '0';
      }
    });

    item.addEventListener('mouseout', () => {
      tooltip.style.opacity = '0';
    });
  });

  function onDrag(e) {
    if (!activeItem) return;

    const closetRect = closetContainer.getBoundingClientRect();
    let x = e.clientX - closetRect.left - initialX;
    let y = e.clientY - closetRect.top - initialY;

    // Constrain movement within closet
    x = Math.max(0, Math.min(x, closetRect.width - activeItem.offsetWidth));
    y = Math.max(0, Math.min(y, closetRect.height - activeItem.offsetHeight));

    activeItem.style.left = `${x}px`;
    activeItem.style.top = `${y}px`;
  }

  function stopDrag() {
    if (activeItem) {
      activeItem.classList.remove('dragging');
      activeItem = null;
    }
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
  }

  // Zoom functionality with mouse wheel
  let wheelTimeout;
  document.addEventListener('wheel', (e) => {
    if (activeItem && !isZoomed) {
      clearTimeout(wheelTimeout);
      wheelTimeout = setTimeout(() => {
        if (e.deltaY < 0) { // Scrolling up
          zoomItem(activeItem);
        }
      }, 50);
    }
  });

  function zoomItem(item) {
    isZoomed = true;
    item.classList.add('zoomed');
    overlay.style.display = 'block';
    
    const closeZoom = () => {
      item.classList.remove('zoomed');
      overlay.style.display = 'none';
      isZoomed = false;
      overlay.removeEventListener('click', closeZoom);
    };
    
    overlay.addEventListener('click', closeZoom);
  }

  // View options
  document.getElementById('slantedView').addEventListener('click', () => {
    clothingItems.forEach((item, index) => {
      item.style.transition = 'all 0.5s ease';
      item.classList.add('staggered');
      item.style.left = `${100 + (index * 120)}px`;
    });
  });

  document.getElementById('facingOutView').addEventListener('click', () => {
    clothingItems.forEach((item, index) => {
      item.style.transition = 'all 0.5s ease';
      item.classList.remove('staggered');
      item.style.left = `${100 + (index * 120)}px`;
    });
  });
});
</script>

</body>
</html>
