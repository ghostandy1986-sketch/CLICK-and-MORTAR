<!DOCTYPE html>
<html>
<head>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: auto; /* Changed from 100% to auto */
            overflow-x: hidden; /* Prevent horizontal scroll */
            overflow-y: visible; /* Enable vertical scroll */
        }

        .background-container {
            width: 100vw;
            height: 2913px; /* Set exact height of your image */
            background-image: url('3DPRINTIT MERGED RESIZED 1920 X 3124.png');
            background-size: 100% 100%; /* Cover full width and height */
            background-position: top center;
            background-repeat: no-repeat;
            position: relative;
        }

        .content {
            width: 100%;
            height: 100%;
            margin: 0 auto;
            position: relative;
        }

        .affiliate-section, .contact-section {
            padding: 20px;
            text-align: center;
        }

        .footer {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            background-color: rgba(255, 140, 98, 0.8);
        }
    </style>
</head>
<body>
    <div class="background-container">
        <div class="content">
            <!-- Your content here -->
        </div>
    </div>
</body>
</html>
