<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jasmin's Luxury Cologne Collection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a, #2d1f3d);
            color: #fff;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
        }

        .logo {
            max-width: 300px;
            margin: 0 auto;
        }

        .display-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .cologne-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .cologne-item:hover {
            transform: translateY(-5px);
        }

        .cologne-item img {
            width: 200px;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .cologne-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .cologne-item:hover::before {
            transform: translateX(100%);
        }

        .magnifier {
            position: fixed;
            width: 150px;
            height: 150px;
            border: 3px solid gold;
            border-radius: 50%;
            pointer-events: none;
            display: none;
            z-index: 1000;
            background-repeat: no-repeat;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1001;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #2d1f3d, #1a1a1a);
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            position: relative;
            color: #fff;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #fff;
        }

        .ad-banner {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            max-width: 300px;
            backdrop-filter: blur(5px);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .vip-club {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(45deg, #c5a47e, #dfbd95);
            padding: 15px;
            border-radius: 10px;
            color: #1a1a1a;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .vip-club:hover {
            transform: scale(1.05);
        }

        .store-link {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(45deg, #4a90e2, #357abd);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .store-link:hover {
            transform: scale(1.05);
        }

        .buy-button {
            background: linear-gradient(45deg, #c5a47e, #dfbd95);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            color: #1a1a1a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.3s ease;
        }

        .buy-button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="JASMINS.png" alt="Jasmin's Cologne" class="logo">
    </div>

    <a href="./jewelerystore3.html" class="store-link">Visit Jewelry Store</a>

    <div class="vip-club">
        🌟 Join VIP Club
        <br>Get 20% Off!
    </div>

    <div class="display-container">
        <!-- Cologne items will be dynamically added here -->
    </div>

    <div class="magnifier" id="magnifier"></div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-details"></div>
        </div>
    </div>

    <div class="ad-banner">
        <h3>Limited Time Offer! 🌟</h3>
        <p>Buy any 2 fragrances and get a luxury travel case FREE!</p>
    </div>

    <script>
        const colognes = [
            {
                name: "Midnight Jasmine",
                price: "$299",
                image: "https://via.placeholder.com/200x250/2d1f3d/ffffff?text=Midnight+Jasmine",
                description: "An enchanting blend of jasmine, vanilla, and mysterious oriental notes."
            },
            {
                name: "Royal Oud",
                price: "$399",
                image: "https://via.placeholder.com/200x250/1a1a1a/ffffff?text=Royal+Oud",
                description: "A majestic combination of rare oud, saffron, and royal amber."
            },
            {
                name: "Golden Rose",
                price: "$349",
                image: "https://via.placeholder.com/200x250/3d1f2d/ffffff?text=Golden+Rose",
                description: "Luxurious damascena rose with hints of precious woods and musk."
            },
            {
                name: "Crystal Noir",
                price: "$449",
                image: "https://via.placeholder.com/200x250/2d3d1f/ffffff?text=Crystal+Noir",
                description: "A sophisticated fusion of black orchid, spices, and vanilla."
            }
        ];

        // Initialize display
        const displayContainer = document.querySelector('.display-container');
        colognes.forEach(cologne => {
            const item = document.createElement('div');
            item.className = 'cologne-item';
            item.innerHTML = `
                <img src="${cologne.image}" alt="${cologne.name}">
                <h3>${cologne.name}</h3>
                <p>${cologne.price}</p>
            `;
            item.addEventListener('click', () => showModal(cologne));
            displayContainer.appendChild(item);
        });

        // Magnifier functionality
        const magnifier = document.getElementById('magnifier');
        let magnifierActive = false;
        let magnificationLevel = 2;

        document.addEventListener('mousemove', (e) => {
            if (!magnifierActive) return;
            
            const x = e.clientX - magnifier.offsetWidth / 2;
            const y = e.clientY - magnifier.offsetHeight / 2;
            
            magnifier.style.left = x + 'px';
            magnifier.style.top = y + 'px';
            
            const elementBelow = document.elementFromPoint(e.clientX, e.clientY);
            if (elementBelow && elementBelow !== magnifier) {
                const rect = elementBelow.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                magnifier.style.backgroundImage = `url(${getComputedStyle(elementBelow).backgroundImage})`;
                magnifier.style.backgroundPosition = `-${x * magnificationLevel - magnifier.offsetWidth / 2}px -${y * magnificationLevel - magnifier.offsetHeight / 2}px`;
                magnifier.style.backgroundSize = `${elementBelow.offsetWidth * magnificationLevel}px ${elementBelow.offsetHeight * magnificationLevel}px`;
            }
        });

        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            magnifierActive = !magnifierActive;
            magnifier.style.display = magnifierActive ? 'block' : 'none';
        });

        document.addEventListener('wheel', (e) => {
            if (!magnifierActive) return;
            e.preventDefault();
            
            magnificationLevel = Math.max(1, Math.min(3, magnificationLevel + (e.deltaY > 0 ? -0.1 : 0.1)));
        });

        // Modal functionality
        const modal = document.getElementById('modal');
        const modalDetails = document.getElementById('modal-details');

        function showModal(cologne) {
            modalDetails.innerHTML = `
                <img src="${cologne.image}" alt="${cologne.name}" style="width: 200px; height: 250px; object-fit: cover; border-radius: 10px;">
                <h2>${cologne.name}</h2>
                <p>${cologne.description}</p>
                <p style="font-size: 1.5em; margin: 15px 0;">${cologne.price}</p>
                <button class="buy-button">Add to Cart</button>
            `;
            modal.style.display = 'flex';
        }

        document.querySelector('.close-modal').addEventListener('click', () => {
            modal.style.display = 'none';
        });

        // VIP Club functionality
        document.querySelector('.vip-club').addEventListener('click', () => {
            alert('Join our VIP Club to receive exclusive offers, early access to new fragrances, and luxury gifts!');
        });
    </script>
</body>
</html>
