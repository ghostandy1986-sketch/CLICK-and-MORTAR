<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enhanced 3D Mall Kiosk Hub</title>
<style>
  * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
  }

  body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      color: #fff;
      overflow: hidden;
      height: 100vh;
  }

  .kiosk-container {
      perspective: 1500px;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
  }

  /* Floating "i" icon raised higher and above kiosk */
  .floating-info {
      position: absolute;
      top: 15%; /* raised even higher */
      left: 50%;
      transform: translateX(-50%) rotateY(0deg);
      width: 60px;
      height: 60px;
      background: linear-gradient(45deg, #4fc3f7, #29b6f6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      color: white;
      box-shadow: 0 4px 20px rgba(79, 195, 247, 0.5);
      animation: float 3s ease-in-out infinite, rotateHorizontal 8s linear infinite;
      z-index: 1100; /* above everything else */
      cursor: pointer;
    }

  @keyframes float {
      0%, 100% { transform: translateX(-50%) translateY(0px); }
      50% { transform: translateX(-50%) translateY(-10px); }
  }

  @keyframes rotateHorizontal {
      from { transform: translateX(-50%) rotateY(0deg); }
      to { transform: translateX(-50%) rotateY(360deg); }
  }

  .kiosk {
      width: 350px;
      height: 500px;
      transform-style: preserve-3d;
      transform: rotateY(0deg);
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
    }

  /* Each side of the kiosk, with placeholders for background images */
  .side {
      position: absolute;
      width: 350px;
      height: 500px;
      background: linear-gradient(145deg, #2a2d3a, #1e2029);
      border: 3px solid #4fc3f7;
      border-radius: 15px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  }

  /* Directory Face */
  .side.directory {
      transform: rotateY(0deg) translateZ(175px);
      background-image: url('infokiosk directory.png');
      background-size: cover;
      background-position: center;
      background-blend-mode: overlay;
      background-color: rgba(42, 45, 58, 0.8);
  }

  /* Info Face (now Mall Settings) */
  .side.info {
      transform: rotateY(120deg) translateZ(175px);
      background-image: url('infokiosk settings.png');
      background-size: cover;
      background-position: center;
      background-blend-mode: overlay;
      background-color: rgba(42, 45, 58, 0.8);
  }

  /* Apps Face */
  .side.apps {
      transform: rotateY(240deg) translateZ(175px);
      background-image: url('infokiosk apps.png');
      background-size: cover;
      background-position: center;
      background-blend-mode: overlay;
      background-color: rgba(42, 45, 58, 0.8);
  }

  .side-header {
      background: rgba(79, 195, 247, 0.9);
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
  }

  .side-content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      overflow-x: hidden;
    }

  /* Scrollbar styling */
  .side-content::-webkit-scrollbar {
      width: 8px;
  }
  .side-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
  }
  .side-content::-webkit-scrollbar-thumb {
      background: #4fc3f7;
      border-radius: 4px;
  }

  /* Buttons and controls styling */
  .search-section {
      margin-bottom: 20px;
  }

  .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 15px;
  }

  .filter-btn {
      padding: 8px 12px;
      background: rgba(79, 195, 247, 0.7);
      border: none;
      border-radius: 20px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
  }

  .filter-btn:hover, .filter-btn.active {
      background: #4fc3f7;
      transform: scale(1.05);
      box-shadow: 0 2px 10px rgba(79, 195, 247, 0.5);
  }

  .search-bar {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #4fc3f7;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 14px;
      backdrop-filter: blur(5px);
  }

  .search-bar::placeholder {
      color: rgba(255, 255, 255, 0.7);
  }

  .buttons-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 20px;
  }

  .kiosk-btn {
      padding: 12px;
      background: linear-gradient(145deg, #4fc3f7, #29b6f6);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      min-height: 45px;
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
  }

  .kiosk-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 1;
  }

  .kiosk-btn span {
      position: relative;
      z-index: 2;
  }

  .kiosk-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(79, 195, 247, 0.4);
  }

  .kiosk-btn:hover::before {
      background: rgba(0, 0, 0, 0.1);
  }

  /* Navigation Arrows - moved closer to center */
  .nav-arrows {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 900;
  }

  .nav-arrows.left {
      left: 25%; /* moved 15% closer to center */
  }
  .nav-arrows.right {
      right: 25%; /* moved 15% closer to center */
  }

  .arrow-btn {
      width: 50px;
      height: 50px;
      background: linear-gradient(45deg, #4fc3f7, #29b6f6);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(79, 195, 247, 0.3);
      transition: all 0.3s ease;
  }

  .arrow-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(79, 195, 247, 0.5);
  }

  /* Detail overlay styles */
  .brand-detail, .app-detail, .info-detail {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(145deg, #2a2d3a, #1e2029);
      border-radius: 15px;
      display: none;
      flex-direction: column;
      z-index: 200;
  }

  .detail-header {
      background: rgba(79, 195, 247, 0.9);
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: space-between;
  }

  .back-btn {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
  }

  .back-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.1);
  }

  .detail-content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      color: white;
  }

  .detail-content::-webkit-scrollbar {
      width: 8px;
  }
  .detail-content::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
  }
  .detail-content::-webkit-scrollbar-thumb {
      background: #4fc3f7;
      border-radius: 4px;
  }

  .rating {
      color: #ffd700;
      margin: 10px 0;
  }

  .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
  }

  .action-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 80px;
  }

  .upload-btn { 
      background: linear-gradient(45deg, #4caf50, #66bb6a);
      font-weight: bold;
  }
  .upload-btn:hover {
      background: linear-gradient(45deg, #66bb6a, #4caf50);
      transform: translateY(-2px);
  }

  .purchase-btn { background: #ff9800; }
  .preview-btn { background: #9c27b0; }

  .brand-logo {
      width: 100%;
      height: 120px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      margin-bottom: 15px;
  }

  .stats-row {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      font-size: 14px;
  }

  .current-deals {
      background: rgba(255, 193, 7, 0.2);
      padding: 10px;
      border-radius: 8px;
      margin: 15px 0;
      border-left: 4px solid #ffc107;
  }

  .pricing-info {
      background: rgba(255, 87, 34, 0.2);
      padding: 10px;
      border-radius: 8px;
      margin: 15px 0;
      text-align: center;
      border: 1px solid #ff5722;
  }

  /* Category filter dropdown */
  .category-dropdown {
      display: none;
      position: absolute;
      background: rgba(42, 45, 58, 0.95);
      border: 2px solid #4fc3f7;
      border-radius: 8px;
      padding: 10px;
      z-index: 300;
      max-height: 200px;
      overflow-y: auto;
      width: 200px;
  }

  .category-item {
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 4px;
      margin: 2px 0;
      font-size: 12px;
  }

  .category-item:hover {
      background: rgba(79, 195, 247, 0.3);
  }

  /* Revenue banner */
  .revenue-banner {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(45deg, #ff6b6b, #ff8e53);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      animation: pulse 2s infinite;
      cursor: pointer;
      z-index: 900;
  }

  @keyframes pulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.05); }
  }

</style>
</head>
<body>
  <!-- Floating "i" icon for system info -->
  <div class="floating-info" aria-label="System Information" title="System Information" onclick="showSystemInfo()">i</div>

  <div class="kiosk-container">
    <!-- Left arrow -->
    <div class="nav-arrows left">
      <button class="arrow-btn" aria-label="Rotate Left" title="Rotate Left" onclick="rotateKiosk('left')">◀</button>
    </div>

    <!-- Kiosk -->
    <div class="kiosk" id="kiosk">
      <div class="status-indicator"></div>

      <!-- Directory Face -->
      <div class="side directory">
        <div class="side-header">DIRECTORY</div>
        <div class="side-content">
          <div class="search-section">
            <div class="filter-buttons">
              <button class="filter-btn active" onclick="setFilter('all', event)">Search All</button>
              <button class="filter-btn" onclick="setFilter('brand', event)">By Brand</button>
              <button class="filter-btn" onclick="toggleCategoryDropdown(event)">By Category</button>
              <button class="filter-btn" onclick="setFilter('az', event)">A-Z</button>
            </div>
            <div class="category-dropdown" id="categoryDropdown">
              <!-- Category items will be populated by JavaScript -->
            </div>
            <input type="text" class="search-bar" placeholder="Search stores and brands..." oninput="searchDirectory(this.value)">
          </div>
          <div class="buttons-grid" id="directoryButtons"></div>
          <!-- Brand detail overlay -->
          <div id="brandDetail" class="brand-detail">
            <div class="detail-header">
              <button class="back-btn" onclick="hideBrandDetail()">←</button>
              <span id="brandName"></span>
              <div></div>
            </div>
            <div class="detail-content">
              <div id="brandLogo" class="brand-logo"></div>
              <p id="brandDescription"></p>
              <div class="stats-row">
                <span id="brandRating"></span>
                <span id="downloadCount"></span>
              </div>
              <div class="stats-row">
                <span id="footTraffic"></span>
                <span>Today's Traffic</span>
              </div>
              <div id="currentDeals" class="current-deals">
                <strong>🔥 Current Deals:</strong>
                <div id="dealsContent"></div>
              </div>
              <div id="salesPitch"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Mall Settings Face (formerly Info) -->
      <div class="side info">
        <div class="side-header">MALL SETTINGS</div>
        <div class="side-content">
          <div class="search-section">
            <div class="filter-buttons">
              <button class="filter-btn active" onclick="setInfoFilter('all', event)">All Settings</button>
              <button class="filter-btn" onclick="setInfoFilter('business', event)">Business</button>
              <button class="filter-btn" onclick="setInfoFilter('services', event)">Services</button>
              <button class="filter-btn" onclick="setInfoFilter('legal', event)">Legal</button>
            </div>
            <input type="text" class="search-bar" placeholder="Search settings..." oninput="searchInfo(this.value)">
          </div>
          <div class="buttons-grid" id="infoButtons"></div>
          <!-- Info detail overlay -->
          <div id="infoDetail" class="info-detail">
            <div class="detail-header">
              <button class="back-btn" onclick="hideInfoDetail()">←</button>
              <span id="infoTitle"></span>
              <div></div>
            </div>
            <div class="detail-content">
              <p id="infoDescription"></p>
              <div class="action-buttons">
                <button class="action-btn" style="background: #2196f3;">Learn More</button>
                <button class="action-btn" style="background: #4caf50;">Contact</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Apps Face -->
      <div class="side apps">
        <div class="side-header">APPS</div>
        <div class="side-content">
          <div class="search-section">
            <div class="filter-buttons">
              <button class="filter-btn active" onclick="setAppFilter('all', event)">All Apps</button>
              <button class="filter-btn" onclick="setAppFilter('free', event)">Free</button>
              <button class="filter-btn" onclick="setAppFilter('premium', event)">Premium</button>
              <button class="filter-btn" onclick="setAppFilter('new', event)">New</button>
            </div>
            <input type="text" class="search-bar" placeholder="Search apps..." oninput="searchApps(this.value)">
          </div>
          <div class="buttons-grid" id="appButtons"></div>
          <!-- App detail overlay -->
          <div id="appDetail" class="app-detail">
            <div class="detail-header">
              <button class="back-btn" onclick="hideAppDetail()">←</button>
              <span id="appTitle"></span>
              <div></div>
            </div>
            <div class="detail-content">
              <div id="appLogo" class="brand-logo"></div>
              <p id="appDescription"></p>
              <div class="rating" id="appRating"></div>
              <div id="appPricing" class="pricing-info">
                <div id="pricingText"></div>
              </div>
              <div class="action-buttons">
                <button class="action-btn upload-btn" onclick="uploadApp()" id="uploadBtn">Upload Now</button>
                <button class="action-btn preview-btn" onclick="previewApp()">Preview</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right arrow -->
    <div class="nav-arrows right">
      <button class="arrow-btn" aria-label="Rotate Right" title="Rotate Right" onclick="rotateKiosk('right')">▶</button>
    </div>

    <!-- Revenue banner -->
    <div class="revenue-banner" onclick="showRevenueInfo()">
      💰 Revenue Optimizer Active
    </div>
  </div>

<script>
  let currentAngle = 0;
  let currentFilter = 'all';
  let directoryData = [];
  let appsData = [];
  let infoData = [];
  let currentApp = null;

  // Categories for directory filtering
  const categories = [
    'Home Goods', 'Clothing', 'Health and Beauty', 'Toys', 'Games', 
    'Books', 'Movies', 'Music', 'Artwork', 'Home Decor', 
    'Vintage Antique', 'Automobile', 'Seasonal Items', 'Video Games', 
    'Gifts', 'AI', 'Arts and Crafts', 'Jewelry', 'Cosmetic and Beauty'
  ];

  // Initialize data
  function initializeData() {
    // Directory Data with your specified brands
    const brandNames = [
      'floatvault', 'stickerbook', 'bookworm', 'tee spree', 'buffbot', 'lawbot', 
      'inventoshack', 'ttmb', '99 sense', 'cross my heart', 'organizer', 'operaitor',
      'DreamGenie', 'cliffords jewelery', 'jasmines cologne', 'wheelz of dealz', 
      'webitentary', 'blankslate', 'selectstartblowcart', 'EZ auto repair', 
      'Doc-u-rite', 'C&M university', 'C&M travel', 'Daypay', 'Galleria artistica',
      'Bow-Wow-MEOW', 'Barterbox', 'auntieQ', 'VHSville', 'craftphene supply',
      'crypto 2 cash atm', 'Gift card'
    ];

    brandNames.forEach((name, i) => {
      directoryData.push({
        id: i + 1,
        name: name,
        brand: name.charAt(0).toUpperCase() + name.slice(1),
        category: categories[i % categories.length],
        description: `${name} offers premium products and services with exceptional customer satisfaction.`,
        rating: (1 + Math.random() * 5).toFixed(1), // 1-6 star rating
        downloads: Math.floor(Math.random() * 10000) + 500,
        traffic: Math.floor(Math.random() * 1000) + 100,
        deals: [`${Math.floor(Math.random() * 50) + 10}% off selected items`, 'Buy 2 get 1 free', 'Free shipping on orders over $50'][Math.floor(Math.random() * 3)],
        salesPitch: `Experience the best of ${name}! Our commitment to quality and customer satisfaction makes us the premier choice for discerning shoppers. Visit us today and discover why thousands of customers choose ${name} for their needs.`,
        logoImage: `${name.replace(/\s+/g, '_').toLowerCase()}_logo.png` // placeholder for custom image
      });
    });

    // Apps Data with your specified apps
    const appNames = [
      'flowerbox', 'shopset', 'digitill', 'mailbin', 'powerinnumbers', 'daypay',
      'CouponKing', 'Piggyback', 'BargainBag', 'Cyberjack', 'Blankslate', 'Organizer',
      'Shopping list', 'Green Cone', 'invisble ink', 'PLaiGROUND', 'Star system',
      'Deal Day', 'Bcake', 'ZipZap', 'crypto2cash atm', 'giftcard X change'
    ];

    appNames.forEach((name, i) => {
      const isFree = Math.random() > 0.6;
      appsData.push({
        id: i + 1,
        name: name,
        type: ['Productivity', 'Shopping', 'Finance', 'Utility', 'Entertainment', 'Business'][i % 6],
        description: `${name} - An innovative app designed to enhance your shopping and productivity experience. Features advanced functionality with user-friendly interface.`,
        rating: (3.0 + Math.random() * 2).toFixed(1),
        price: isFree ? 'Free' : `$${(Math.random() * 5 + 5).toFixed(2)}`, // $5-$10 range
        isNew: Math.random() > 0.8,
        logoImage: `${name.replace(/\s+/g, '_').toLowerCase()}_app.png` // placeholder for custom image
      });
    });

    // Mall Settings Data
    const settingsItems = [
      {name: 'Brand Partners', category: 'business', description: 'Explore partnership opportunities with leading brands'},
      {name: 'P.O.D. Service', category: 'services', description: 'Print on Demand services for custom products'},
      {name: 'Affiliates', category: 'business', description: 'Join our affiliate program and earn commissions'},
      {name: 'Affiliate Partners', category: 'business', description: 'Manage existing affiliate partnerships'},
      {name: 'About C&M', category: 'services', description: 'Learn about our company history and mission'},
      {name: 'Custom Nav Skins', category: 'services', description: 'Personalize your navigation experience'},
      {name: 'C&M Merchandise', category: 'services', description: 'Official C&M branded merchandise and apparel'},
      {name: 'Store for Lease', category: 'business', description: 'Available retail spaces for rent in prime locations'},
      {name: 'Domain Sales', category: 'business', description: 'Premium domain addresses available for purchase'},
      {name: 'Mall Options', category: 'services', description: 'Customize your mall experience and preferences'},
      {name: 'Disclaimers', category: 'legal', description: 'Important legal disclaimers and terms'},
      {name: 'Subscription Overview', category: 'services', description: 'View available subscription packages and benefits'},
      {name: 'Monthly Drawing', category: 'services', description: 'Enter our monthly prize drawing for exciting rewards'},
      {name: 'Contests', category: 'services', description: 'Participate in ongoing contests and competitions'}
    ];

    infoData = settingsItems;
  }

  function rotateKiosk(direction) {
    const kiosk = document.getElementById('kiosk');
    if (direction === 'left') {
      currentAngle -= 120;
    } else {
      currentAngle += 120;
    }
    kiosk.style.transform = `rotateY(${currentAngle}deg)`;
    hideAllDetails();
    hideCategoryDropdown();
    trackUserInteraction('rotation', direction);
  }

  function generateDirectoryButtons() {
    const container = document.getElementById('directoryButtons');
    container.innerHTML = '';

    let filteredData = directoryData.slice();
    if (currentFilter === 'brand') {
      filteredData.sort((a, b) => a.brand.localeCompare(b.brand));
    } else if (currentFilter === 'category') {
      filteredData.sort((a, b) => a.category.localeCompare(b.category));
    } else if (currentFilter === 'az') {
      filteredData.sort((a, b) => a.name.localeCompare(b.name));
    }

    filteredData.forEach(store => {
      const button = document.createElement('button');
      button.className = 'kiosk-btn';
      button.innerHTML = `<span>${store.name}</span>`;
      // Add custom background image
      button.style.backgroundImage = `url('${store.logoImage}')`;
      button.onclick = () => showBrandDetail(store);
      container.appendChild(button);
    });
  }

  function generateAppButtons() {
    const container = document.getElementById('appButtons');
    container.innerHTML = '';
    appsData.forEach(app => {
      const button = document.createElement('button');
      button.className = 'kiosk-btn';
      button.innerHTML = `<span>${app.name}${app.isNew ? ' 🆕' : ''}</span>`;
      // Add custom background image
      button.style.backgroundImage = `url('${app.logoImage}')`;
      button.onclick = () => showAppDetail(app);
      container.appendChild(button);
    });
  }

  function generateInfoButtons() {
    const container = document.getElementById('infoButtons');
    container.innerHTML = '';
    infoData.forEach(info => {
      const button = document.createElement('button');
      button.className = 'kiosk-btn';
      button.innerHTML = `<span>${info.name}</span>`;
      button.onclick = () => showInfoDetail(info);
      container.appendChild(button);
    });
  }

  function generateCategoryDropdown() {
    const dropdown = document.getElementById('categoryDropdown');
    dropdown.innerHTML = '';
    categories.forEach(category => {
      const item = document.createElement('div');
      item.className = 'category-item';
      item.textContent = category;
      item.onclick = () => filterByCategory(category);
      dropdown.appendChild(item);
    });
  }

  function toggleCategoryDropdown(event) {
    const dropdown = document.getElementById('categoryDropdown');
    const isVisible = dropdown.style.display === 'block';
    
    if (isVisible) {
      hideCategoryDropdown();
    } else {
      const rect = event.target.getBoundingClientRect();
      dropdown.style.display = 'block';
      dropdown.style.left = `${rect.left}px`;
      dropdown.style.top = `${rect.bottom + 5}px`;
    }
  }

  function hideCategoryDropdown() {
    document.getElementById('categoryDropdown').style.display = 'none';
  }

  function filterByCategory(category) {
    currentFilter = 'category';
    hideCategoryDropdown();
    
    // Filter directory data by selected category
    const container = document.getElementById('directoryButtons');
    container.innerHTML = '';
    
    const filteredData = directoryData.filter(store => store.category === category);
    filteredData.forEach(store => {
      const button = document.createElement('button');
      button.className = 'kiosk-btn';
      button.innerHTML = `<span>${store.name}</span>`;
      button.style.backgroundImage = `url('${store.logoImage}')`;
      button.onclick = () => showBrandDetail(store);
      container.appendChild(button);
    });
  }

  function setFilter(filter, event) {
    currentFilter = filter;
    document.querySelectorAll('.side.directory .filter-btn').forEach(btn => btn.classList.remove('active'));
    if (event && event.target) {
      event.target.classList.add('active');
    }
    hideCategoryDropdown();
    generateDirectoryButtons();
  }

  function setAppFilter(filter, event) {
    document.querySelectorAll('.side.apps .filter-btn').forEach(btn => btn.classList.remove('active'));
    if (event && event.target) {
      event.target.classList.add('active');
    }
    
    const container = document.getElementById('appButtons');
    container.innerHTML = '';
    
    let filteredApps = appsData.slice();
    if (filter === 'free') {
      filteredApps = appsData.filter(app => app.price === 'Free');
    } else if (filter === 'premium') {
      filteredApps = appsData.filter(app => app.price !== 'Free');
    } else if (filter === 'new') {
      filteredApps = appsData.filter(app => app.isNew);
    }
    
    filteredApps.forEach(app => {
      const button = document.createElement('button');
      button.className = 'kiosk-btn';
      button.innerHTML = `<span>${app.name}${app.isNew ? ' 🆕' : ''}</span>`;
      button.style.backgroundImage = `url('${app.logoImage}')`;
      button.onclick = () => showAppDetail(app);
      container.appendChild(button);
    });
  }

  function setInfoFilter(filter, event) {
    document.querySelectorAll('.side.info .filter-btn').forEach(btn => btn.classList.remove('active'));
    if (event && event.target) {
      event.target.classList.add('active');
    }
    
    const container = document.getElementById('infoButtons');
    container.innerHTML = '';
    
    let filteredInfo = infoData.slice();
    if (filter !== 'all') {
      filteredInfo = infoData.filter(info => info.category === filter);
    }
    
    filteredInfo.forEach(info => {
      const button = document.createElement('button');
      button.className = 'kiosk-btn';
      button.innerHTML = `<span>${info.name}</span>`;
      button.onclick = () => showInfoDetail(info);
      container.appendChild(button);
    });
  }

  function showBrandDetail(store) {
    document.getElementById('brandName').textContent = store.name;
    document.getElementById('brandLogo').style.backgroundImage = `url('${store.logoImage}')`;
    document.getElementById('brandDescription').textContent = store.description;
    document.getElementById('brandRating').innerHTML = `⭐ ${store.rating}/6.0`;
    document.getElementById('downloadCount').innerHTML = `📥 ${store.downloads.toLocaleString()} downloads`;
    document.getElementById('footTraffic').innerHTML = `👥 ${store.traffic} visitors`;
    document.getElementById('dealsContent').textContent = store.deals;
    document.getElementById('salesPitch').innerHTML = `<strong>Why Choose ${store.name}?</strong><br>${store.salesPitch}`;
    document.getElementById('brandDetail').style.display = 'flex';
    trackUserInteraction('brand_view', store.name);
  }

  function showAppDetail(app) {
    currentApp = app;
    document.getElementById('appTitle').textContent = app.name;
    document.getElementById('appLogo').style.backgroundImage = `url('${app.logoImage}')`;
    document.getElementById('appDescription').textContent = app.description;
    document.getElementById('appRating').innerHTML = `⭐ Rating: ${app.rating}/5.0`;
    
    const pricingText = document.getElementById('pricingText');
    if (app.price === 'Free') {
      pricingText.innerHTML = '<strong>FREE APP</strong><br>Available for all users';
      document.getElementById('uploadBtn').textContent = 'Download Free';
    } else {
      pricingText.innerHTML = `<strong>Premium App - ${app.price}</strong><br>Non-members: ${app.price} | Subscribers: Free Upload`;
      document.getElementById('uploadBtn').textContent = 'Upload Now';
    }
    
    document.getElementById('appDetail').style.display = 'flex';
    trackUserInteraction('app_view', app.name);
  }

  function showInfoDetail(info) {
    document.getElementById('infoTitle').textContent = info.name;
    document.getElementById('infoDescription').textContent = info.description;
    document.getElementById('infoDetail').style.display = 'flex';
    trackUserInteraction('info_view', info.name);
  }

  function hideBrandDetail() {
    document.getElementById('brandDetail').style.display = 'none';
  }

  function hideAppDetail() {
    document.getElementById('appDetail').style.display = 'none';
  }

  function hideInfoDetail() {
    document.getElementById('infoDetail').style.display = 'none';
  }

  function hideAllDetails() {
    hideBrandDetail();
    hideAppDetail();
    hideInfoDetail();
  }

  function uploadApp() {
    if (currentApp) {
      if (currentApp.price === 'Free') {
        alert(`✅ ${currentApp.name} has been downloaded and added to your personal navbar storage!`);
      } else {
        // Simulate subscription check
        const isSubscriber = Math.random() > 0.5; // Random for demo
        if (isSubscriber) {
          alert(`✅ ${currentApp.name} has been uploaded to your personal navbar storage! (Subscriber benefit)`);
        } else {
          const confirmPurchase = confirm(`Purchase ${currentApp.name} for ${currentApp.price}?\n\nNon-members pay full price. Subscribers get free uploads!`);
          if (confirmPurchase) {
            alert(`✅ Purchase successful! ${currentApp.name} has been added to your personal navbar storage!`);
          }
        }
      }
      trackUserInteraction('app_upload', currentApp.name);
    }
  }

  function searchDirectory(query) {
    const container = document.getElementById('directoryButtons');
    if (!query) {
      generateDirectoryButtons();
      return;
    }
    const filtered = directoryData.filter(store =>
      store.name.toLowerCase().includes(query.toLowerCase()) ||
      store.brand.toLowerCase().includes(query.toLowerCase()) ||
      store.category.toLowerCase().includes(query.toLowerCase())
    );
    container.innerHTML = '';
    filtered.forEach(store => {
      const button = document.createElement('button');
      button.className = 'kiosk-btn';
      button.innerHTML = `<span>${store.name}</span>`;
      button.style.backgroundImage = `url('${store.logoImage}')`;
      button.onclick = () => showBrandDetail(store);
      container.appendChild(button);
    });
  }

  function searchApps(query) {
    const container = document.getElementById('appButtons');
    if (!query) {
      generateAppButtons();
      return;
    }
    const filtered = appsData.filter(app =>
      app.name.toLowerCase().includes(query.toLowerCase()) ||
      app.type.toLowerCase().includes(query.toLowerCase())
    );
    container.innerHTML = '';
    filtered.forEach(app => {
      const button = document.createElement('button');
      button.className = 'kiosk-btn';
      button.innerHTML = `<span>${app.name}${app.isNew ? ' 🆕' : ''}</span>`;
      button.style.backgroundImage = `url('${app.logoImage}')`;
      button.onclick = () => showAppDetail(app);
      container.appendChild(button);
    });
  }

  function searchInfo(query) {
    const container = document.getElementById('infoButtons');
    if (!query) {
      generateInfoButtons();
      return;
    }
    const filtered = infoData.filter(info =>
      info.name.toLowerCase().includes(query.toLowerCase()) ||
      info.description.toLowerCase().includes(query.toLowerCase())
    );
    container.innerHTML = '';
    filtered.forEach(info => {
      const button = document.createElement('button');
      button.className = 'kiosk-btn';
      button.innerHTML = `<span>${info.name}</span>`;
      button.onclick = () => showInfoDetail(info);
      container.appendChild(button);
    });
  }

  function previewApp() {
    if (currentApp) {
      alert(`🎮 App Preview: ${currentApp.name}\n\nThis would open a demo version of the app with limited functionality. Premium features available in full version.`);
      trackUserInteraction('app_preview', currentApp.name);
    }
  }

  function showSystemInfo() {
    alert(`🖥️ C&M Mall Kiosk System v3.0
    
✅ Features Active:
• 3D Interactive Interface
• Revenue Optimization 
• Real-time Updates
• Custom Image Support
• Advanced Filtering
• Subscription Integration
• Personal Navbar Storage

🎨 Customization Available:
• Brand Logos & Images
• App Icons
• Category Images  
• Background Themes
• Color Schemes`);
  }

  function showRevenueInfo() {
    alert(`💰 Revenue Optimization Features:

📊 Analytics & Tracking:
• User Behavior Analytics
• Conversion Tracking
• Traffic Monitoring

💼 Business Features:
• Targeted Advertising
• Premium Placement Options
• Commission Tracking
• Affiliate Programs
• Subscription Management

🎯 Monetization:
• App Store Integration
• Premium Memberships
• Advertisement Revenue
• Partnership Commissions`);
  }

  function trackUserInteraction(action, details) {
    console.log(`📈 User Interaction: ${action} - ${details}`);
    // Here you could send data to analytics service
  }

  // Click outside to close dropdown
  document.addEventListener('click', function(event) {
    const dropdown = document.getElementById('categoryDropdown');
    const categoryBtn = event.target.closest('.filter-btn');
    
    if (!dropdown.contains(event.target) && (!categoryBtn || !categoryBtn.textContent.includes('Category'))) {
      hideCategoryDropdown();
    }
  });

  // Initialize everything on page load
  window.onload = function() {
    initializeData();
    generateDirectoryButtons();
    generateAppButtons();
    generateInfoButtons();
    generateCategoryDropdown();
  };
</script>
</body>
