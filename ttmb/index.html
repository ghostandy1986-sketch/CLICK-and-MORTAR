<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Party Decor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background-image: url('ttmbEDIT.png');
      background-size: cover;
      background-position: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Transparent buttons with 3D effect */
    .btn {
      position: absolute;
      background: rgba(255, 255, 255, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.7);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 14px;
      color: white;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 10px rgba(0, 0, 0, 0.7);
    }

    /* Conveyor belts */
    .conveyor-belt {
      position: absolute;
      top: 26px;
      left: 378px;
      width: 1798px;
      height: 213px;
      overflow-x: auto;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-direction: row-reverse;
    }

    .conveyor-belt img {
      height: 100%;
    }

    /* Individual items */
    .item {
      width: 50px;
      height: 50px;
      background-color: rgba(255, 255, 255, 0.6);
      border-radius: 5px;
      margin-right: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .item:active {
      transform: scale(1.1);
    }

    /* Shelves */
    .shelf {
      position: absolute;
      top: 134px;
      width: 1562px;
      height: 86px;
      border: 2px dashed #fff;
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: space-evenly;
      align-items: center;
    }

    .shelf-item {
      width: 50px;
      height: 50px;
      background: #fff;
      border-radius: 5px;
      cursor: pointer;
    }

    /* Cart */
    .cart {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 10px;
      border-radius: 12px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <!-- Buttons -->
  <div class="btn" style="top: 890px; left: 2624px;" onclick="window.location.href='timewarp.html'">ttmb Warp Drive Music Editor</div>
  <div class="btn" style="top: 1154px; left: 2999px;" onclick="window.location.href='ttmbsell.html'">Sell Stuff</div>

  <!-- Zooming Buttons -->
  <div class="btn" style="top: 707px; left: 2805px;" onclick="zoomButton('ttmbdigital.html')">Digital Downloads</div>
  <div class="btn" style="top: 544px; left: 2807px;" onclick="zoomButton('ttmbvinyl.html')">Vinyl</div>
  <div class="btn" style="top: 711px; left: 2617px;" onclick="zoomButton('ttmbtapes.html')">Cassettes</div>
  <div class="btn" style="top: 547px; left: 2618px;" onclick="zoomButton('ttmbcd.html')">CD</div>

  <!-- Conveyor belts -->
  <div id="belt" class="conveyor-belt" ondrop="drop(event)" ondragover="allowDrop(event)">
    <!-- Items that can be dragged on this belt -->
    <div class="item" draggable="true" id="item1" ondragstart="drag(event)"></div>
    <div class="item" draggable="true" id="item2" ondragstart="drag(event)"></div>
    <div class="item" draggable="true" id="item3" ondragstart="drag(event)"></div>
  </div>

  <!-- Shelves -->
  <div class="shelf" style="top: 134px; left: 1053px;" id="shelf1" ondrop="dropOnShelf(event, 'shelf1')" ondragover="allowDrop(event)">
    <div class="shelf-item" draggable="true" ondragstart="drag(event)"></div>
  </div>
  <div class="shelf" style="top: 138px; left: 1154px;" id="shelf2" ondrop="dropOnShelf(event, 'shelf2')" ondragover="allowDrop(event)">
    <div class="shelf-item" draggable="true" ondragstart="drag(event)"></div>
  </div>
  <div class="shelf" style="top: 138px; left: 1275px;" id="shelf3" ondrop="dropOnShelf(event, 'shelf3')" ondragover="allowDrop(event)">
    <div class="shelf-item" draggable="true" ondragstart="drag(event)"></div>
  </div>
  <div class="shelf" style="top: 134px; left: 1395px;" id="shelf4" ondrop="dropOnShelf(event, 'shelf4')" ondragover="allowDrop(event)">
    <div class="shelf-item" draggable="true" ondragstart="drag(event)"></div>
  </div>
  <div class="shelf" style="top: 134px; left: 1519px;" id="shelf5" ondrop="dropOnShelf(event, 'shelf5')" ondragover="allowDrop(event)">
    <div class="shelf-item" draggable="true" ondragstart="drag(event)"></div>
  </div>
  <div class="shelf" style="top: 142px; left: 1636px;" id="shelf6" ondrop="dropOnShelf(event, 'shelf6')" ondragover="allowDrop(event)">
    <div class="shelf-item" draggable="true" ondragstart="drag(event)"></div>
  </div>

  <!-- Cart -->
  <div class="cart">
    <span id="cart-count">Cart: 0 items</span>
  </div>

  <script>
    let cartCount = 0;

    function drag(event) {
      event.dataTransfer.setData("text", event.target.id);
    }

    function allowDrop(event) {
      event.preventDefault();
    }

    function drop(event) {
      event.preventDefault();
      let data = event.dataTransfer.getData("text");
      let draggedElement = document.getElementById(data);
      event.target.appendChild(draggedElement);

      // Update cart count
      cartCount++;
      document.getElementById('cart-count').textContent = 'Cart: ' + cartCount + ' items';
    }

    function dropOnShelf(event, shelfId) {
      event.preventDefault();
      let data = event.dataTransfer.getData("text");
      let draggedElement = document.getElementById(data);
      document.getElementById(shelfId).appendChild(draggedElement);
    }

    function zoomButton(url) {
      window.location.href = url;
      // Simulate zoom animation and URL change
      // Additional CSS/JS effects can be added here
    }
  </script>

</body>
</html>
