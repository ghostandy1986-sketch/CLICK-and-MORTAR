<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Legacy Platform</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-xl font-bold text-blue-600">Digital Legacy Platform</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="tab-will" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-blue-600">Will Generator</button>
                    <button id="tab-verify" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-blue-600">Asset Verification</button>
                    <button id="connectWallet" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Connect Wallet</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Will Generator Section -->
    <div id="willSection" class="max-w-3xl mx-auto py-12 px-4">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-900">Digital Will Generator</h1>
            <p class="mt-2 text-gray-600">Secure your digital legacy</p>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-6">
            <div id="willProgress" class="mb-8">
                <div class="flex justify-between mb-2">
                    <div class="step active">1. Personal Info</div>
                    <div class="step">2. Digital Assets</div>
                    <div class="step">3. Beneficiaries</div>
                </div>
                <div class="h-2 bg-gray-200 rounded-full">
                    <div class="progress-bar h-full bg-blue-600 rounded-full transition-all" style="width: 33%"></div>
                </div>
            </div>

            <form id="willForm" class="space-y-6">
                <!-- Step 1: Personal Information -->
                <div class="step-content" id="step1">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Full Name</label>
                            <input type="text" name="fullName" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Email</label>
                            <input type="email" name="email" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Date of Birth</label>
                            <input type="date" name="dob" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                        </div>
                    </div>
                </div>

                <!-- Step 2: Digital Assets -->
                <div class="step-content hidden" id="step2">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Cryptocurrency Holdings</label>
                            <textarea name="crypto" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Digital Accounts</label>
                            <textarea name="accounts" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Step 3: Beneficiaries -->
                <div class="step-content hidden" id="step3">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Primary Beneficiary</label>
                            <input type="text" name="primaryBeneficiary" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Relationship</label>
                            <input type="text" name="relationship" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                        </div>
                    </div>
                </div>

                <div class="flex justify-between mt-6">
                    <button type="button" id="prevStep" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300">Previous</button>
                    <button type="button" id="nextStep" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Next</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Asset Verification Section -->
    <div id="verifySection" class="max-w-3xl mx-auto py-12 px-4 hidden">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-900">Digital Asset Verification</h1>
            <p class="mt-2 text-gray-600">Verify ownership and authenticity of your digital assets</p>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Upload Digital Asset</label>
                <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg">
                    <div class="space-y-1 text-center">
                        <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <div class="flex text-sm text-gray-600">
                            <label for="file-upload" class="relative cursor-pointer bg-white rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none">
                                <span>Upload a file</span>
                                <input id="file-upload" name="file-upload" type="file" class="sr-only">
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <button id="verifyAsset" class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700">
                Verify Asset
            </button>

            <div id="verificationResult" class="mt-6 hidden">
                <div class="bg-green-50 p-4 rounded-lg">
                    <div class="flex">
                        <div class="flex-shrink-0">
                            <svg class="h-5 w-5 text-green-400" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <div class="ml-3">
                            <h3 class="text-sm font-medium text-green-800">Asset Verified</h3>
                            <div class="mt-2 text-sm text-green-700">
                                <p>Asset hash: <span id="assetHash"></span></p>
                                <p>Timestamp: <span id="verificationTime"></span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Will Generator Logic
        let currentStep = 1;
        const totalSteps = 3;

        document.getElementById('nextStep').addEventListener('click', () => {
            if (currentStep < totalSteps) {
                document.getElementById(`step${currentStep}`).classList.add('hidden');
                currentStep++;
                document.getElementById(`step${currentStep}`).classList.remove('hidden');
                updateProgress();
            }
        });

        document.getElementById('prevStep').addEventListener('click', () => {
            if (currentStep > 1) {
                document.getElementById(`step${currentStep}`).classList.add('hidden');
                currentStep--;
                document.getElementById(`step${currentStep}`).classList.remove('hidden');
                updateProgress();
            }
        });

        function updateProgress() {
            const progress = ((currentStep - 1) / (totalSteps - 1)) * 100;
            document.querySelector('.progress-bar').style.width = `${progress}%`;
            document.getElementById('prevStep').style.display = currentStep === 1 ? 'none' : 'block';
            document.getElementById('nextStep').textContent = currentStep === totalSteps ? 'Generate Will' : 'Next';
        }

        // Asset Verification Logic
        let isWalletConnected = false;

        document.getElementById('connectWallet').addEventListener('click', async () => {
            if (window.ethereum) {
                try {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    isWalletConnected = true;
                    document.getElementById('connectWallet').textContent = 'Connected';
                    document.getElementById('connectWallet').classList.add('bg-green-600');
                } catch (error) {
                    console.error('Error connecting wallet:', error);
                }
            } else {
                alert('Please install MetaMask to use this feature');
            }
        });

        document.getElementById('verifyAsset').addEventListener('click', async () => {
            if (!isWalletConnected) {
                alert('Please connect your wallet first');
                return;
            }

            const fileInput = document.getElementById('file-upload');
            if (!fileInput.files[0]) {
                alert('Please select a file to verify');
                return;
            }

            // Simulate verification process
            document.getElementById('verificationResult').classList.remove('hidden');
            document.getElementById('assetHash').textContent = 'Ox' + Math.random().toString(16).slice(2);
            document.getElementById('verificationTime').textContent = new Date().toLocaleString();
        });

        // Tab switching
        document.getElementById('tab-will').addEventListener('click', () => {
            document.getElementById('willSection').classList.remove('hidden');
            document.getElementById('verifySection').classList.add('hidden');
        });

        document.getElementById('tab-verify').addEventListener('click', () => {
            document.getElementById('willSection').classList.add('hidden');
            document.getElementById('verifySection').classList.remove('hidden');
        });
    </script>
</body>
</html>
