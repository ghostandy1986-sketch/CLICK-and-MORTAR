<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberJack - Doc-U-Rite Heist</title>
    <style>
        :root {
            --primary-color: #00ff88;
            --secondary-color: #ff0055;
            --danger-color: #ff3344;
            --success-color: #00ff88;
            --doc-blue: #003366;
            --doc-light: #005bb5;
            --dark-bg: #0a0a0a;
            --light-bg: #1a1a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, var(--dark-bg), var(--light-bg));
            font-family: 'Courier New', monospace;
            color: var(--primary-color);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.05) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.05) 2px, transparent 2px);
            background-size: 40px 40px;
            z-index: -1;
            animation: gridMove 30s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            perspective: 1500px;
        }

        /* Skinny Bar Score Box - Top */
        .score-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(180deg, rgba(0, 51, 102, 0.95), rgba(0, 91, 181, 0.85));
            border-bottom: 3px solid var(--primary-color);
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.4);
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 30px;
            backdrop-filter: blur(10px);
        }

        .score-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .score-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 10px currentColor);
        }

        .score-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .score-label {
            font-size: 9px;
            color: #88ccff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 16px;
            color: var(--primary-color);
            font-weight: bold;
        }

        .divider {
            width: 2px;
            height: 40px;
            background: linear-gradient(180deg, transparent, var(--primary-color), transparent);
        }

        .inventory-mini {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .mini-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #2a4a6a, #1a3a5a);
            border: 2px solid #555;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .mini-btn:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-color);
            transform: translateY(-2px);
        }

        .mini-btn.active {
            border-color: var(--primary-color);
            background: linear-gradient(145deg, #00ff8844, #00ff8822);
        }

        /* Office Environment */
        .office-floor {
            position: absolute;
            width: 100%;
            height: calc(100% - 60px);
            top: 60px;
            background: 
                repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 80px),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 80px),
                linear-gradient(135deg, #1a1a2a, #0a0a1a);
        }

        /* Printer Buttons */
        .printer {
            position: absolute;
            width: 120px;
            height: 90px;
            background: linear-gradient(145deg, #2a3a4a, #1a2a3a);
            border: 3px solid var(--doc-blue);
            border-radius: 12px;
            box-shadow: 
                0 8px 25px rgba(0, 0, 0, 0.6),
                inset 0 0 20px rgba(0, 91, 181, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .printer:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 35px rgba(0, 91, 181, 0.5);
        }

        .printer::before {
            content: '🖨️';
            font-size: 40px;
            margin-bottom: 5px;
        }

        .printer-label {
            font-size: 9px;
            color: #88ccff;
            text-align: center;
            text-transform: uppercase;
        }

        /* Flying Papers */
        .paper {
            position: absolute;
            width: 30px;
            height: 40px;
            background: white;
            border: 2px solid #003366;
            border-radius: 3px;
            box-shadow: 0 4px 15px rgba(0, 51, 102, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            pointer-events: none;
            z-index: 20;
            animation: paperFloat 0.5s ease-in-out infinite alternate;
        }

        @keyframes paperFloat {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }

        /* Player Character */
        .player {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, var(--primary-color), #00aa55);
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 0 30px var(--primary-color);
            z-index: 50;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .player::after {
            content: '🥷';
            font-size: 30px;
        }

        /* Document Coupons - 3D Items */
        .coupon {
            position: absolute;
            cursor: grab;
            user-select: none;
            z-index: 40;
            transform-style: preserve-3d;
            transition: all 0.3s;
        }

        .coupon:hover {
            transform: scale(1.1) translateY(-5px) rotateY(10deg);
        }

        .coupon.dragging {
            cursor: grabbing;
            z-index: 100;
            animation: couponGlow 0.5s infinite alternate;
        }

        @keyframes couponGlow {
            0% { filter: brightness(1) drop-shadow(0 0 20px currentColor); }
            100% { filter: brightness(1.4) drop-shadow(0 0 40px currentColor); }
        }

        /* Free Print Coupon */
        .coupon.free-print {
            width: 100px;
            height: 70px;
            background: linear-gradient(145deg, #4a90e2, #2563eb);
            border: 3px solid #1d4ed8;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            padding: 5px;
        }

        .coupon.free-print::before {
            content: '🖨️';
            font-size: 30px;
        }

        .coupon.free-print::after {
            content: 'FREE PRINT';
            font-size: 10px;
            margin-top: 5px;
        }

        /* Free Template Coupon */
        .coupon.free-template {
            width: 100px;
            height: 70px;
            background: linear-gradient(145deg, #f59e0b, #d97706);
            border: 3px solid #b45309;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            padding: 5px;
        }

        .coupon.free-template::before {
            content: '📄';
            font-size: 30px;
        }

        .coupon.free-template::after {
            content: 'FREE TEMPLATE';
            font-size: 9px;
            margin-top: 5px;
        }

        /* Specialty Bundle Coupon */
        .coupon.specialty-bundle {
            width: 110px;
            height: 80px;
            background: linear-gradient(145deg, #8b5cf6, #6d28d9);
            border: 3px solid #5b21b6;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            padding: 5px;
            text-align: center;
        }

        .coupon.specialty-bundle::before {
            content: '📦';
            font-size: 35px;
        }

        .coupon.specialty-bundle::after {
            content: 'SPECIALTY BUNDLE';
            font-size: 8px;
            margin-top: 5px;
            line-height: 1.2;
        }

        /* Exit Zone */
        .exit-zone {
            position: absolute;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, var(--success-color), #00aa55);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            z-index: 30;
            border: 5px solid #fff;
            box-shadow: 0 0 60px var(--success-color);
            animation: exitPulse 2s infinite alternate;
        }

        @keyframes exitPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .exit-zone::before {
            content: '🚪';
            font-size: 50px;
        }

        .exit-zone::after {
            content: 'EXIT';
            font-size: 14px;
            margin-top: 5px;
        }

        /* Overlays */
        .caught-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.5);
            display: none;
            z-index: 200;
            animation: caughtFlash 0.5s;
        }

        @keyframes caughtFlash {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        #game-over-content {
            background: linear-gradient(145deg, var(--doc-blue), var(--doc-light));
            padding: 50px;
            border-radius: 25px;
            text-align: center;
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 80px var(--primary-color);
            max-width: 600px;
            animation: gameOverPop 0.5s ease-out;
        }

        @keyframes gameOverPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #game-over-content h2 {
            font-size: 48px;
            margin-bottom: 30px;
            color: white;
            text-shadow: 0 0 20px var(--primary-color);
        }

        #game-over-content p {
            font-size: 20px;
            margin-bottom: 40px;
            color: #ccc;
            line-height: 1.6;
        }

        #game-over-content button {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin: 10px;
        }

        #game-over-content button:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 10px 30px var(--primary-color);
        }

        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 51, 102, 0.98);
            color: white;
            padding: 30px 50px;
            border-radius: 15px;
            border: 3px solid var(--primary-color);
            font-size: 24px;
            font-weight: bold;
            z-index: 999;
            animation: notificationPop 2s ease-in-out;
            box-shadow: 0 0 60px var(--primary-color);
            text-align: center;
        }

        @keyframes notificationPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 51, 102, 0.95);
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            border: 2px solid var(--primary-color);
            z-index: 100;
            font-size: 14px;
            text-align: center;
            box-shadow: 0 0 30px var(--primary-color);
        }

        @media (max-width: 768px) {
            .score-bar { height: 50px; gap: 15px; padding: 0 10px; }
            .score-icon { font-size: 20px; }
            .score-value { font-size: 14px; }
            .mini-btn { width: 35px; height: 35px; font-size: 16px; }
            .printer { width: 80px; height: 60px; }
            .instructions { font-size: 12px; padding: 10px 20px; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Skinny Bar Score Box -->
        <div class="score-bar">
            <div class="score-section">
                <div class="score-icon">💰</div>
                <div class="score-info">
                    <div class="score-label">Coupons</div>
                    <div class="score-value" id="coupons">0/3</div>
                </div>
            </div>

            <div class="divider"></div>

            <div class="score-section">
                <div class="score-icon">❤️</div>
                <div class="score-info">
                    <div class="score-label">Lives</div>
                    <div class="score-value" id="lives">3/3</div>
                </div>
            </div>

            <div class="divider"></div>

            <div class="score-section">
                <div class="score-icon">⭐</div>
                <div class="score-info">
                    <div class="score-label">Collected</div>
                    <div class="score-value" id="collected">0</div>
                </div>
            </div>

            <div class="inventory-mini">
                <div class="mini-btn" id="disguise-btn" title="Disguise">🎭</div>
                <div class="mini-btn" id="bag-btn" title="Bag">💼</div>
                <div class="mini-btn" id="gloves-btn" title="Gloves">🧤</div>
                <div class="mini-btn" id="special-btn" title="Special">⚡</div>
            </div>
        </div>

        <div class="office-floor"></div>
        <div id="game-grid"></div>
        
        <div class="player" id="player"></div>
        <div class="exit-zone" id="exit"></div>
        <div class="caught-overlay" id="caught-overlay"></div>

        <div class="instructions">
            🎯 Use WASD/Arrow Keys to move • Avoid flying papers • Collect all 3 Doc-U-Rite coupons!
        </div>

        <div id="game-over">
            <div id="game-over-content">
                <h2 id="game-over-title">MISSION COMPLETE</h2>
                <p id="game-over-message"></p>
                <button onclick="location.reload()">Play Again</button>
                <button onclick="window.location.href='DOCURITEMODIFIED.html'">Visit Doc-U-Rite</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            TOTAL_COUPONS: 3,
            LIVES: 3,
            PLAYER_SPEED: 5,
            PAPER_SPEED: 3,
            PAPER_SPAWN_INTERVAL: 800,
            PRINTER_SHOOT_INTERVAL: 1500
        };

        class DocURiteHeist {
            constructor() {
                this.score = 0;
                this.lives = CONFIG.LIVES;
                this.collected = 0;
                this.printers = [];
                this.papers = [];
                this.coupons = [];
                this.player = null;
                this.gameActive = true;
                this.keys = {};
                this.inventory = {
                    disguise: false,
                    bag: false,
                    gloves: false,
                    special: false
                };
                this.init();
            }

            init() {
                this.createPrinterMaze();
                this.createCoupons();
                this.createPlayer();
                this.positionExit();
                this.setupEventListeners();
                this.startGameLoop();
                this.startPrinterShooting();
            }

            createPrinterMaze() {
                const grid = document.getElementById('game-grid');
                
                // Staggered office printer layout - creates a challenging maze
                const printerPositions = [
                    // Entrance area
                    { left: '15%', top: '20%', label: 'Invoice' },
                    { left: '25%', top: '25%', label: 'Manual' },
                    
                    // Left corridor
                    { left: '10%', top: '35%', label: 'Passport' },
                    { left: '18%', top: '40%', label: 'Purchase Order' },
                    { left: '12%', top: '50%', label: 'Bylaws' },
                    { left: '20%', top: '55%', label: 'Form I-9' },
                    { left: '15%', top: '65%', label: 'Registration' },
                    
                    // Center area - high traffic
                    { left: '35%', top: '25%', label: 'Application' },
                    { left: '42%', top: '30%', label: 'Contact Form' },
                    { left: '38%', top: '40%', label: 'Donation' },
                    { left: '45%', top: '45%', label: 'Feedback' },
                    { left: '40%', top: '55%', label: 'Order Form' },
                    { left: '48%', top: '60%', label: 'Consent' },
                    { left: '43%', top: '70%', label: 'Survey' },
                    
                    // Right corridor
                    { left: '60%', top: '22%', label: 'Leave Request' },
                    { left: '68%', top: '28%', label: 'Subscription' },
                    { left: '63%', top: '38%', label: 'Incident Report' },
                    { left: '70%', top: '43%', label: 'Expense Report' },
                    { left: '65%', top: '53%', label: 'Interview Eval' },
                    { left: '73%', top: '58%', label: 'Performance' },
                    { left: '68%', top: '68%', label: 'Waiver' },
                    
                    // Far right area
                    { left: '82%', top: '25%', label: 'Liability' },
                    { left: '78%', top: '35%', label: 'Complaint' },
                    { left: '85%', top: '45%', label: 'Medical Consent' },
                    { left: '80%', top: '55%', label: 'Medical History' },
                    { left: '87%', top: '65%', label: 'Cost-Plus' },
                    
                    // Bottom area - final gauntlet
                    { left: '30%', top: '80%', label: 'Fixed Price' },
                    { left: '45%', top: '83%', label: 'Time & Materials' },
                    { left: '60%', top: '78%', label: 'Unit Price' },
                    { left: '75%', top: '82%', label: 'Implied Contract' },
                    
                    // Strategic positions
                    { left: '28%', top: '15%', label: 'Unilateral' },
                    { left: '52%', top: '18%', label: 'Express' },
                    { left: '55%', top: '75%', label: 'Bilateral' },
                    { left: '33%', top: '62%', label: 'Event Flyer' },
                    { left: '58%', top: '52%', label: 'Club Flyer' },
                    { left: '50%', top: '35%', label: 'Announcement' },
                    { left: '72%', top: '73%', label: 'Alert Flyer' },
                    { left: '90%', top: '30%', label: 'Digital Flyer' }
                ];

                printerPositions.forEach(pos => {
                    const printer = document.createElement('div');
                    printer.className = 'printer';
                    printer.style.left = pos.left;
                    printer.style.top = pos.top;
                    
                    const label = document.createElement('div');
                    label.className = 'printer-label';
                    label.textContent = pos.label;
                    printer.appendChild(label);
                    
                    grid.appendChild(printer);
                    this.printers.push({
                        element: printer,
                        x: parseFloat(pos.left),
                        y: parseFloat(pos.top)
                    });
                });
            }

            createCoupons() {
                const couponTypes = [
                    { class: 'free-print', x: '8%', y: '30%', name: 'Free Doc-U-Rite Print' },
                    { class: 'free-template', x: '8%', y: '50%', name: 'Free Doc-U-Rite Template' },
                    { class: 'specialty-bundle', x: '8%', y: '70%', name: '12-Doc Business Starter Pack' }
                ];

                couponTypes.forEach(coupon => {
                    const element = document.createElement('div');
                    element.className = `coupon ${coupon.class}`;
                    element.style.left = coupon.x;
                    element.style.top = coupon.y;
                    element.dataset.name = coupon.name;
                    element.dataset.originalX = coupon.x;
                    element.dataset.originalY = coupon.y;
                    
                    document.getElementById('game-grid').appendChild(element);
                    this.coupons.push(element);
                });
            }

            createPlayer() {
                this.player = document.getElementById('player');
                this.player.style.left = '5%';
                this.player.style.top = '45%';
            }

            positionExit() {
                const exit = document.getElementById('exit');
                exit.style.right = '5%';
                exit.style.top = '45%';
            }

            setupEventListeners() {
                // Keyboard controls
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                });

                document.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                });

                // Inventory buttons
                document.getElementById('disguise-btn').addEventListener('click', () => this.toggleInventory('disguise'));
                document.getElementById('bag-btn').addEventListener('click', () => this.toggleInventory('bag'));
                document.getElementById('gloves-btn').addEventListener('click', () => this.toggleInventory('gloves'));
                document.getElementById('special-btn').addEventListener('click', () => this.toggleInventory('special'));

                // Coupon dragging (alternative control)
                this.coupons.forEach(coupon => {
                    coupon.addEventListener('mousedown', (e) => this.startDragging(e, coupon));
                    coupon.addEventListener('touchstart', (e) => this.startDragging(e, coupon));
                });

                document.addEventListener('mousemove', (e) => this.handleDrag(e));
                document.addEventListener('touchmove', (e) => this.handleDrag(e), { passive: false });
                document.addEventListener('mouseup', () => this.stopDragging());
                document.addEventListener('touchend', () => this.stopDragging());
            }

            toggleInventory(type) {
                this.inventory[type] = !this.inventory[type];
                const btn = document.getElementById(`${type}-btn`);
                
                if (this.inventory[type]) {
                    btn.classList.add('active');
                    this.showNotification(`${type.toUpperCase()} Activated!`);
                    this.vibrate([50, 30, 50]);
                } else {
                    btn.classList.remove('active');
                }
            }

            startDragging(e, coupon) {
                if (!this.gameActive) return;
                e.preventDefault();
                this.isDragging = true;
                this.currentCoupon = coupon;
                coupon.classList.add('dragging');
                this.vibrate([50]);
            }

            handleDrag(e) {
                if (!this.isDragging || !this.currentCoupon) return;
                e.preventDefault();

                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);

                this.currentCoupon.style.left = (clientX - this.currentCoupon.offsetWidth / 2) + 'px';
                this.currentCoupon.style.top = (clientY - this.currentCoupon.offsetHeight / 2) + 'px';

                this.checkPaperCollision(this.currentCoupon);
            }

            stopDragging() {
                if (!this.isDragging) return;
                this.isDragging = false;
                if (this.currentCoupon) {
                    this.currentCoupon.classList.remove('dragging');
                    this.checkCouponExit();
                }
                this.currentCoupon = null;
            }

            startPrinterShooting() {
                setInterval(() => {
                    if (!this.gameActive) return;
                    
                    // Random printers shoot papers
                    this.printers.forEach(printer => {
                        if (Math.random() < 0.3) { // 30% chance each printer shoots
                            this.shootPaper(printer);
                        }
                    });
                }, CONFIG.PRINTER_SHOOT_INTERVAL);
            }

            shootPaper(printer) {
                const paper = document.createElement('div');
                paper.className = 'paper';
                paper.textContent = '📄';
                
                const printerRect = printer.element.getBoundingClientRect();
                paper.style.left = printerRect.left + printerRect.width / 2 - 15 + 'px';
                paper.style.top = printerRect.top + printerRect.height / 2 - 20 + 60 + 'px'; // +60 for score bar
                
                document.getElementById('game-grid').appendChild(paper);
                
                const angle = Math.random() * Math.PI * 2; // Random direction
                const velocity = {
                    x: Math.cos(angle) * CONFIG.PAPER_SPEED,
                    y: Math.sin(angle) * CONFIG.PAPER_SPEED
                };
                
                this.papers.push({
                    element: paper,
                    vx: velocity.x,
                    vy: velocity.y,
                    lifetime: 0
                });
            }

            movePlayer() {
                if (!this.gameActive) return;
                
                const playerRect = this.player.getBoundingClientRect();
                let x = parseFloat(this.player.style.left);
                let y = parseFloat(this.player.style.top);
                
                const speed = CONFIG.PLAYER_SPEED * (this.inventory.gloves ? 1.5 : 1);
                
                // WASD and Arrow key controls
                if (this.keys['w'] || this.keys['arrowup']) {
                    y = Math.max(8, y - speed); // Account for score bar
                }
                if (this.keys['s'] || this.keys['arrowdown']) {
                    y = Math.min(90, y + speed);
                }
                if (this.keys['a'] || this.keys['arrowleft']) {
                    x = Math.max(0, x - speed);
                }
                if (this.keys['d'] || this.keys['arrowright']) {
                    x = Math.min(95, x + speed);
                }
                
                this.player.style.left = x + '%';
                this.player.style.top = y + '%';
                
                // Check collision with papers
                this.checkPlayerPaperCollision();
                
                // Check coupon pickup
                this.checkCouponPickup();
                
                // Check exit
                this.checkPlayerExit();
            }

            checkPlayerPaperCollision() {
                if (this.inventory.disguise && Math.random() < 0.5) return; // 50% dodge with disguise
                
                const playerRect = this.player.getBoundingClientRect();
                
                this.papers.forEach((paper, index) => {
                    const paperRect = paper.element.getBoundingClientRect();
                    
                    if (this.isColliding(playerRect, paperRect)) {
                        this.handleHit();
                        paper.element.remove();
                        this.papers.splice(index, 1);
                    }
                });
            }

            checkPaperCollision(element) {
                const elementRect = element.getBoundingClientRect();
                
                this.papers.forEach((paper, index) => {
                    const paperRect = paper.element.getBoundingClientRect();
                    
                    if (this.isColliding(elementRect, paperRect)) {
                        this.handleHit();
                        paper.element.remove();
                        this.papers.splice(index, 1);
                    }
                });
            }

            checkCouponPickup() {
                const playerRect = this.player.getBoundingClientRect();
                
                this.coupons.forEach((coupon, index) => {
                    const couponRect = coupon.getBoundingClientRect();
                    
                    if (this.isColliding(playerRect, couponRect) && !coupon.classList.contains('dragging')) {
                        this.collected++;
                        this.updateUI();
                        this.showNotification(`✅ ${coupon.dataset.name} Collected!`);
                        this.vibrate([50, 50, 50]);
                        coupon.remove();
                        this.coupons.splice(index, 1);
                    }
                });
            }

            checkCouponExit() {
                if (!this.currentCoupon) return;
                
                const couponRect = this.currentCoupon.getBoundingClientRect();
                const exitRect = document.getElementById('exit').getBoundingClientRect();
                
                if (this.isColliding(couponRect, exitRect)) {
                    this.score++;
                    this.collected++;
                    this.updateUI();
                    this.showNotification(`✅ ${this.currentCoupon.dataset.name} Secured!`);
                    this.vibrate([50, 50, 50]);
                    this.currentCoupon.remove();
                    this.coupons = this.coupons.filter(c => c !== this.currentCoupon);
                    
                    if (this.score >= CONFIG.TOTAL_COUPONS) {
                        this.endGame(true, 'All Doc-U-Rite coupons secured! Visit Doc-U-Rite to redeem your rewards!');
                    }
                } else {
                    // Return to original position if not at exit
                    this.currentCoupon.style.left = this.currentCoupon.dataset.originalX;
                    this.currentCoupon.style.top = this.currentCoupon.dataset.originalY;
                }
            }

            checkPlayerExit() {
                const playerRect = this.player.getBoundingClientRect();
                const exitRect = document.getElementById('exit').getBoundingClientRect();
                
                if (this.isColliding(playerRect, exitRect)) {
                    if (this.collected >= CONFIG.TOTAL_COUPONS) {
                        this.endGame(true, 'Perfect heist! All Doc-U-Rite coupons secured! Redeem at Doc-U-Rite now!');
                    } else {
                        this.showNotification(`Need ${CONFIG.TOTAL_COUPONS - this.collected} more coupon(s)!`);
                    }
                }
            }

            handleHit() {
                if (this.inventory.special && Math.random() < 0.3) return; // 30% shield with special
                
                this.lives--;
                this.updateUI();
                
                document.getElementById('caught-overlay').style.display = 'block';
                this.vibrate([200, 100, 200]);
                
                setTimeout(() => {
                    document.getElementById('caught-overlay').style.display = 'none';
                }, 500);
                
                this.showNotification('🚨 HIT BY PAPER!');
                
                if (this.currentCoupon) {
                    this.currentCoupon.style.left = this.currentCoupon.dataset.originalX;
                    this.currentCoupon.style.top = this.currentCoupon.dataset.originalY;
                    this.currentCoupon.classList.remove('dragging');
                    this.currentCoupon = null;
                    this.isDragging = false;
                }
                
                if (this.lives <= 0) {
                    this.endGame(false, 'Mission Failed! You were hit too many times by flying documents.');
                }
            }

            isColliding(rect1, rect2) {
                return !(rect1.right < rect2.left || 
                        rect1.left > rect2.right || 
                        rect1.bottom < rect2.top || 
                        rect1.top > rect2.bottom);
            }

            updateUI() {
                document.getElementById('coupons').textContent = `${this.score}/${CONFIG.TOTAL_COUPONS}`;
                document.getElementById('lives').textContent = `${this.lives}/${CONFIG.LIVES}`;
                document.getElementById('collected').textContent = this.collected;
            }

            showNotification(message) {
                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.textContent = message;
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.remove();
                }, 2000);
            }

            endGame(won, message) {
                this.gameActive = false;
                document.getElementById('game-over-title').textContent = won ? '🎉 MISSION SUCCESS!' : '❌ MISSION FAILED';
                document.getElementById('game-over-message').textContent = message;
                document.getElementById('game-over').style.display = 'flex';
            }

            vibrate(pattern = [100]) {
                if ('vibrate' in navigator) {
                    navigator.vibrate(pattern);
                }
            }

            startGameLoop() {
                const animate = () => {
                    if (!this.gameActive) return;
                    
                    // Move player
                    this.movePlayer();
                    
                    // Update papers
                    this.papers.forEach((paper, index) => {
                        const paperElement = paper.element;
                        let x = parseFloat(paperElement.style.left);
                        let y = parseFloat(paperElement.style.top);
                        
                        x += paper.vx;
                        y += paper.vy;
                        
                        // Bounce off walls
                        if (x <= 0 || x >= window.innerWidth - 30) paper.vx *= -1;
                        if (y <= 60 || y >= window.innerHeight - 40) paper.vy *= -1;
                        
                        paperElement.style.left = x + 'px';
                        paperElement.style.top = y + 'px';
                        
                        // Remove old papers
                        paper.lifetime++;
                        if (paper.lifetime > 500) { // ~8 seconds at 60fps
                            paperElement.remove();
                            this.papers.splice(index, 1);
                        }
                    });
                    
                    requestAnimationFrame(animate);
                };
                animate();
            }
        }

        // Initialize game
        window.onload = () => new DocURiteHeist();

        // Prevent context menu
        document.addEventListener('contextmenu', e => e.preventDefault());

        console.log('🎮 CyberJack - Doc-U-Rite Heist Edition');
        console.log('📄 Collect all 3 premium document coupons!');
        console.log('🖨️ Avoid the paper storm from 38 office printers!');
    </script>
</body>
</html>
