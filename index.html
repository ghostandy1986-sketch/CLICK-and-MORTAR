<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Brand Directory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
        }

        /* Z-INDEX HIERARCHY - FIXED */
        /* 1. Background elements: 1-999 */
        /* 2. Scrolling logos: 1000-1999 */
        /* 3. Navigation: 2000-2999 */
        /* 4. Brand buttons: 3000-3999 */
        /* 5. Preview popups: 4000-4999 */
        /* 6. Modals: 9000-9999 */
        /* 7. Special effects: 10000+ */

        /* Navigation Bar - exact positioning */
        .navbar {
            position: absolute;
            z-index: 2000;
            top: calc((545px - 25px - 231px + 25px) * 1.31); /* Lowered by 5px */
            left: calc(50% + 10px); /* Exact position */
            transform: translateX(-50%);
            display: flex;
            gap: calc(5px * 1.31);
            background: transparent;
            padding: 0;
        }

        .nav-button {
            background: transparent;
            border: none;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            height: calc(25px * 1.31);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: calc(90px * 1.31);
            border-radius: 4px;
        }

        .nav-button:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        .nav-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .nav-display {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            z-index: 2500;
            display: none;
            backdrop-filter: blur(10px);
            padding: 20px;
            left: max(10px, min(calc(50% + 10px), calc(100vw - 220px * 1.31 - 10px))) !important;
            transform: translateX(-50%);
            width: calc(220px * 1.31) !important;
            height: calc(180px * 1.31) !important;
            min-height: calc(180px * 1.31) !important;
            max-height: calc(180px * 1.31) !important;
            max-width: calc(220px * 1.31) !important;
            overflow-y: scroll !important;
            overflow-x: hidden !important;
        }

        .nav-display.show {
            display: block;
        }

        /* About and Options displays - MAXIMUM COORDINATES */
        .about-display, .options-display {
            top: calc((560px - 25px - 231px + 25px + 10px) * 1.31) !important;
            animation: slideDown 0.3s ease-out;
        }

        /* Login display - MAXIMUM COORDINATES */
        .login-display {
            top: calc((545px - 50px - 231px + 25px - 170px) * 1.31) !important;
            animation: slideUp 0.3s ease-out;
        }
        /* Webkit scrollbar styling */
        .nav-display::-webkit-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, 0.3) rgba(0, 0, 0, 0.1);
        }

        .nav-display::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1) !important;
            border-radius: 4px;
        }

        .nav-display::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.3) !important;
            border-radius: 4px;
            transition: background 0.3s ease;
        }

        .nav-display::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.6) !important;
        }

        /* Prevent display overflow beyond boundaries */
        .nav-display {
            max-width: calc(220px * 1.31) !important;
            max-height: calc(180px * 1.31) !important;
            left: max(10px, min(calc(50% + 10px), calc(100vw - 220px * 1.31 - 10px))) !important;
        }

        /* Content area styling within fixed dimensions */
        .nav-display-item {
            padding: 8px 12px;
            color: #333;
            text-decoration: none;
            display: block;
            cursor: pointer;
            transition: background-color 0.3s;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 12px; /* Smaller font to fit more content */
        }

        .nav-display-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .nav-display-item:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }

        /* Dynamic content area for nav displays */
        .nav-content {
            display: none;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(240, 240, 240, 0.9);
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.4;
            order: -1;
            position: relative;
            word-wrap: break-word;
            white-space: pre-wrap;
            max-height: calc(120px * 1.31); /* Constrain content height */
            overflow-y: auto; /* Allow scrolling within content */
        }

        .nav-content.active {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Login Form Styles */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .login-input {
            padding: 8px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.9);
        }

        .login-button, .signup-button {
            padding: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 12px;
        }

        .login-button:hover, .signup-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .signup-button {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            margin-top: 5px;
        }

        .close-display {
            position: absolute;
            top: 5px;
            right: 10px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #666;
            z-index: 2501;
        }

        .close-display:hover {
            color: #333;
        }

        /* Custom Cursor Classes */
        .cursor-peace { cursor: url('cursor-peace.png'), auto; }
        .cursor-left { cursor: url('cursor-left.png'), auto; }
        .cursor-right { cursor: url('cursor-right.png'), auto; }
        .cursor-punch { cursor: url('cursor-punch.png'), auto; }
        .cursor-thumb-up { cursor: url('cursor-thumb-up.png'), auto; }
        .cursor-thumb-down { cursor: url('cursor-thumb-down.png'), auto; }
        .cursor-birdie { cursor: url('cursor-birdie.png'), auto; }

        /* Spider Web Enhancement Styles */
        .spider-web-enhanced {
            position: fixed;
            width: 100px;
            height: 100px;
            pointer-events: none;
            z-index: 10001;
            animation: fadeOutWebEnhanced 10s ease-out forwards;
         }

         .web-line-enhanced {
            position: absolute;
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #333, transparent);
            top: 48px;
            left: 0;
            transform-origin: center;
         }

         .web-circle-enhanced {
            position: absolute;
            border: 2px solid #333;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
         }

         @keyframes fadeOutWebEnhanced {
            0% { opacity: 0; transform: scale(0.5); }
            10% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.5); }
         }

         /* Traffic Counter Styles */
        .traffic-counter {
            position: absolute !important;
            top: 15px !important;
            right: 20px !important;
            background: rgba(0,0,0,0.7);
            color: #0ff;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            z-index: 9999 !important;
        }

        /* Star Rating Styles - positioned parallel with title and counter */
        .star-rating {
            position: absolute !important;
            top: 15px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            text-align: center;
            z-index: 9999 !important;
        }

        .star-rating .stars {
            font-size: 20px;
            color: #ffd700;
            cursor: help;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

         /* Scrolling Text Animations */
         @keyframes scrollTextRight {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
         }

         @keyframes scrollTextLeft {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
         }
        
        .brand-switcher {
            position: absolute;
            width: 1920px;
            height: 1705px;
            background-image: url('columnassembly5.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            flex-shrink: 0;
            zoom: 131%;
            cursor: pointer;
            top: -231px;
            z-index: 100;
        }

        /* FIXED: Brand buttons - proper z-index hierarchy */
        .brand-button {
            position: absolute;
            background: transparent !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 3000;
        }

        .brand-button:active {
            cursor: grabbing;
            transform: scale(0.98);
        }

        .brand-button:hover {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            z-index: 3001;
        }

        /* FIXED: Preview popups - highest z-index for brand content */
        .preview-popup {
            position: absolute;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            display: none;
            z-index: 4500;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        .brand-button:hover .preview-popup {
            display: block;
            opacity: 1;
            transition-delay: 0.3s;
        }

        .brand-button:not(:hover) .preview-popup {
            opacity: 0;
            transition-delay: 0s;
        }
        
        .text-ad-button {
            position: absolute;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            z-index: 500;
        }

        .text-ad-button:hover {
            outline: 2px solid rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            animation: shimmerOutline 1s ease-in-out infinite;
            z-index: 501;
        }

        @keyframes shimmerOutline {
            0% { outline-color: rgba(255, 215, 0, 0.8); }
            50% { outline-color: rgba(255, 255, 255, 1); }
            100% { outline-color: rgba(255, 215, 0, 0.8); }
        }

        .scrolling-text {
            white-space: nowrap;
            color: #333;
            font-weight: bold;
            font-size: 18px;
            display: inline-block;
            animation: scrollTextTrain 5s linear infinite;
        }

        @keyframes scrollTextTrain {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* FIXED: Scroll windows - lower z-index */
        .scroll-window {
            position: absolute;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            z-index: 1200;

        }

            position: absolute;
            background: #333;

        /* Concentric circles */

            border: 2px solid #333;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

        function initializeLogoScrolling() {

        function startLogoAnimation() {
            if (animationRunning) return;
            animationRunning = true;
            
            const leftContainer = document.getElementById('leftLogos');
            const rightContainer = document.getElementById('rightLogos');
            
            if (!isMovingRight) {
                // Start from right container, move left
                animateLogosLeftward(rightContainer, leftContainer);
            } else {
                // Start from left container, move right
                animateLogosRightward(leftContainer, rightContainer);
            }
        }

        function animateLogosLeftward(startContainer, endContainer) {
            let logoIndex = 0;
            
            function showNextLogo() {
                if (logoIndex >= 60) {
                    // All logos shown, switch direction
                    isMovingRight = true;
                    currentLogoIndex = 0;
                    animationRunning = false;
                    setTimeout(startLogoAnimation, 1000);
                    return;
                }
                
                const logo = createLogoElement(logoData[logoIndex % logoData.length], logoIndex);
                
                // Start from right side of right container
                logo.style.left = startContainer.offsetWidth + 'px';
                logo.style.opacity = '1';
                startContainer.appendChild(logo);
                
                // Animate across right container with slower speed (increased duration by 15%)
                setTimeout(() => {
                    logo.style.transition = 'left 2.3s linear';
                    logo.style.left = '-' + logo.offsetWidth + 'px';
                    
                    // Move to left container
                    setTimeout(() => {
                        if (logo.parentNode) {
                            logo.parentNode.removeChild(logo);
                        }
                        logo.style.left = endContainer.offsetWidth + 'px';
                        logo.style.transition = 'left 2.3s linear';
                        endContainer.appendChild(logo);
                        
                        setTimeout(() => {
                            logo.style.left = '-' + logo.offsetWidth + 'px';
                            
                            // Remove logo after animation
                            setTimeout(() => {
                                if (logo.parentNode) {
                                    logo.parentNode.removeChild(logo);
                                }
                            }, 2300);
                        }, 50);
                    }, 2300);
                }, 100);
                
                logoIndex++;
                setTimeout(showNextLogo, 2300);
            }
            
            showNextLogo();
        }

function createSpiderWeb(x, y) {
    const web = document.createElement('div');
    web.className = 'spider-web-enhanced';
    web.style.left = x - 50 + 'px';
    web.style.top = y - 50 + 'px';
    
    // Create more visible web structure
    for (let i = 0; i < 8; i++) {
        const line = document.createElement('div');
        line.className = 'web-line-enhanced';
        line.style.transform = `rotate(${i * 45}deg)`;
        web.appendChild(line);
    }
    
    // Create concentric circles
    for (let i = 1; i <= 4; i++) {
        const circle = document.createElement('div');
        circle.className = 'web-circle-enhanced';
        circle.style.width = circle.style.height = (i * 25) + 'px';
        web.appendChild(circle);
    }
    
    document.body.appendChild(web);
    
    setTimeout(() => {
        web.remove();
    }, 10000);
}

            // Create duplicate set for seamless scrolling
            topLeftLogos.forEach((logo, index) => {

                logoElement.className = 'logo-item';
                logoElement.style.backgroundImage = `url('${logo.image}')`;
                logoElement.title = logo.name;
                logoElement.style.left = ((index + topLeftLogos.length) * 82) + 'px';
                logoElement.addEventListener('click', function() {
                    openModal(logo.name, logo.image, `Learn more about ${logo.name}.`);

                topLeftContainer.appendChild(logoElement);

                logoElement.style.backgroundImage = `url('${logo.image}')`;

            // Set animation for top containers with slower speed (increased duration by 15%)
            topLeftContainer.style.animation = 'scrollLogos 34.5s linear infinite';
            topRightContainer.style.animation = 'scrollLogos 28.75s linear infinite reverse';

            // FIXED: Close displays when clicking outside with proper event handling
            document.addEventListener('click', function(e) {
                // Check if click is outside any nav display or nav button
                const isNavDisplay = e.target.closest('.nav-display');
                const isNavButton = e.target.closest('.nav-button');
                const isDisplayItem = e.target.closest('.nav-display-item');
                const isCloseButton = e.target.closest('.close-display');
                const isLoginButton = e.target.closest('.login-button, .signup-button');
                
                // Only close if clicking completely outside navigation elements
                if (!isNavDisplay && !isNavButton && !isDisplayItem && !isCloseButton && !isLoginButton) {
                    document.querySelectorAll('.nav-display').forEach(d => {
                        d.classList.remove('show');
                        const content = d.querySelector('.nav-content');
                        if (content) content.classList.remove('active');
                    });
                }
            });

            document.getElementById('loginForm').addEventListener('submit', function(e) {
